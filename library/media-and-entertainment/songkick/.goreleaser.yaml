version: 2
project_name: songkick-pp-cli
changelog:
  disable: true
builds:
  - id: songkick-pp-cli
    main: ./cmd/songkick-pp-cli
    binary: songkick-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/songkick/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: songkick-pp-mcp
    main: ./cmd/songkick-pp-mcp
    binary: songkick-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: songkick-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The Songkick CLI for music-agency tour routing — every documented endpoint, a local SQLite store, and routing..."
    install: |
      bin.install "songkick-pp-cli"
      bin.install "songkick-pp-mcp"
